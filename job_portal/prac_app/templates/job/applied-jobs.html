{% extends 'master/base.html' %}


{% block content %}

<h2>Applied Jobs</h2>

<table class="table table-bordered">

    <tr>
        <th>JOb title</th>
        <th>Category</th>
        <th>Action</th>
    </tr>

    
    {% for application in applications %}

    <tr>
        <td>{{application.job.title}}</td>
        <td>{{application.job.category}}</td>

        <td>
            <form method="POST">
                {% csrf_token %}
                <button
                type="submit"
                name="remove_application"
                value="{{application.id}}"
                class="btn btn-danger btn-sm"
                >
                Remove

                </button>
            </form>
        </td>
    </tr>

    {%empty%}
    <tr>
        <td colspan="3">
            No applied Jobs
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock content %}
