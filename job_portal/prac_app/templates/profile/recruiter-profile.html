{% extends "master/base.html" %}

{% block content %}

<div class="border p-3">

    {% if profile.company_logo %}
    <img src="{{ profile.company_logo.url }}"
         class="mb-3 rounded-circle border"
         style="width:120px;height:120px;object-fit:cover;">
    {% endif %}

    <h3>{{ profile.company_name }}</h3>

    <p><strong>Email:</strong> {{ profile.company_email }}</p>

    <p><strong>Web:</strong> {{ profile.company_website }}</p>

    <p><strong>Info:</strong> {{ profile.company_description }}</p>

    <a href="?edit=true" class="btn btn-primary">Edit</a>

    <form method="POST" class="d-inline">
        {% csrf_token %}
        <button type="submit" name="delete_profile" class="btn btn-danger">
            Delete
        </button>
    </form>

</div>

{% endblock %}
